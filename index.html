<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Expense Tracker</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="app-header">
  <div class="brand">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 64 64" role="img">
        <rect x="6" y="14" width="52" height="36" rx="8" fill="#2e7d32"></rect>
        <rect x="12" y="20" width="40" height="24" rx="6" fill="#4caf50"></rect>
        <circle cx="32" cy="32" r="8" fill="#e8f5e9"></circle>
        <path d="M30 28h4a2 2 0 0 1 0 4h-4a2 2 0 0 0 0 4h4" fill="none" stroke="#2e7d32" stroke-width="2" stroke-linecap="round"></path>
      </svg>
    </div>
    <div>
      <h1>Expense Tracker</h1>
      <div id="monthLabel" class="muted"></div>
    </div>
  </div>
  <div class="header-actions">
    <button id="settingsBtn" class="btn ghost">Settings</button>
    <button id="exportBtn" class="btn ghost">Export</button>
    <label class="btn ghost file">
      Import
      <input id="importInput" type="file" accept="application/json" />
    </label>
  </div>
</header>

<main class="container">

<section class="card">
  <div class="row">
    <button id="quickProteinBtn" class="btn primary">+ Protein</button>
    <button id="addExpenseBtn" class="btn">+ Expense</button>
    <button id="undoLastBtn" class="btn">Undo Last</button>
    <button id="resetBtn" class="btn">Reset</button>
  </div>

  <div class="divider"></div>

  <div class="grid3">
    <div>
      <div class="label">This month spending</div>
      <div id="monthSpending" class="big">—</div>
    </div>
    <div>
      <div class="label">Vs last month</div>
      <div id="vsLastMonth" class="big">—</div>
    </div>
    <div>
      <div class="label">Coupon savings</div>
      <div id="monthSavings" class="big">—</div>
    </div>
  </div>

  <div class="divider"></div>
  <details>
    <summary>Category breakdown</summary>
    <div id="categoryBreakdown" class="list"></div>
  </details>
</section>

<section class="card">
  <div class="row space">
    <h2 class="h2">Previous months</h2>
    <div id="snapshotsCount" class="muted"></div>
  </div>
  <div id="snapshotsList" class="list"></div>
</section>

<section class="card">
  <div class="row space">
    <h2 class="h2">This month entries</h2>
    <div id="entriesCount" class="muted"></div>
  </div>
  <div id="entriesList" class="list"></div>
</section>

</main>

<script src="app.js"></script>
</body>
</html>
